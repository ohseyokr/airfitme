<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIRFITME FRMS - Full-Stack Ecosystem Simulator</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: {
                            950: '#050e14',
                            900: '#07151e',
                            800: '#091a24',
                            700: '#0f2735',
                            600: '#143447',
                            500: '#1c4761',
                        },
                        skyBlue: '#38bdf8',
                        aviationOrange: '#f59e0b',
                        aviationRed: '#ef4444',
                        aviationTeal: '#0ea5e9'
                    }
                }
            }
        }
    </script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>

    <!-- FontAwesome Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>

            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #030a0e;
        }
        ::-webkit-scrollbar {

        }
        ::-webkit-scrollbar-track {

        }
        ::-webkit-scrollbar-thumb {
            background: #143447;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #38bdf8;
        }
        @keyframes ring-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .6; transform: scale(1.03); }

        .critical-pulse {
            animation: ring-pulse 1.2s infinite;
        }
    </style>
</head>
<body class="text-slate-200 antialiased overflow-x-hidden min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 시스템에 내장되어 다운로드 가능한 리소스 정의
        const ARCHITECTURE_CODE = {
            sqlSchema: `-- PostgreSQL DB Schema - Optimized for Render & RDS
-- AIRFITME FRMS Cloud Database Definition

CREATE TABLE IF NOT EXISTS crew_profiles (
    id SERIAL PRIMARY KEY,
    name VARCHAR(50) NOT NULL,
    crew_id_tag VARCHAR(20) UNIQUE NOT NULL,
    rank VARCHAR(20) NOT NULL,
    base_location VARCHAR(50) DEFAULT 'ICN',
    sleep_efficiency_avg NUMERIC(5,2) DEFAULT 88.00,
    emergency_contact VARCHAR(25) NOT NULL,
    created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
);

CREATE TABLE IF NOT EXISTS devices (
    id SERIAL PRIMARY KEY,
    device_uid VARCHAR(50) UNIQUE NOT NULL,
    device_type VARCHAR(30) NOT NULL,
    firmware_version VARCHAR(15) DEFAULT '1.0.0',
    battery_level INT DEFAULT 100,
    status VARCHAR(15) DEFAULT 'ACTIVE',
    paired_crew_id INT REFERENCES crew_profiles(id) ON DELETE SET NULL,
    updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
);

CREATE TABLE IF NOT EXISTS telemetry_logs (
    id BIGSERIAL PRIMARY KEY,
    device_uid VARCHAR(50) REFERENCES devices(device_uid) ON DELETE CASCADE,
    crew_id INT REFERENCES crew_profiles(id) ON DELETE CASCADE,
    heart_rate INT DEFAULT 72,
    hrv_ms NUMERIC(5,2) DEFAULT 55.0,
    respiratory_rate INT DEFAULT 14,
    skin_temperature NUMERIC(4,1) DEFAULT 36.8,
    spo2_percent INT DEFAULT 98,
    tvoc_ppb NUMERIC(6,2) DEFAULT 12.0,
    co2_ppm NUMERIC(6,2) DEFAULT 475.0,
    h2_raw NUMERIC(7,2) DEFAULT 13955.0,
    ethanol_raw NUMERIC(7,2) DEFAULT 19174.0,
    gyro_angle_pitch NUMERIC(5,2) DEFAULT 5.0,
    fall_detected BOOLEAN DEFAULT FALSE,
    recorded_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
);

CREATE TABLE IF NOT EXISTS safety_alerts (
    id SERIAL PRIMARY KEY,
    crew_id INT REFERENCES crew_profiles(id) ON DELETE CASCADE,
    alert_type VARCHAR(30) NOT NULL,
    severity_level VARCHAR(15) NOT NULL,
    trigger_value VARCHAR(100) NOT NULL,
    status VARCHAR(15) DEFAULT 'ACTIVE',
    triggered_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
    resolved_at TIMESTAMP WITH TIME ZONE
);`,
            expressServer: `// Node.js Express Server with WebSocket Broadcast Support
const express = require('express');
const { Pool } = require('pg');
const http = require('http');
const WebSocket = require('ws');
const cors = require('cors');

const app = express();
const server = http.createServer(app);
const wss = new WebSocket.Server({ server });

app.use(cors());
app.use(express.json());

const pool = new Pool({
    connectionString: process.env.DATABASE_URL,
    ssl: { rejectUnauthorized: false }
});

let clients = [];
wss.on('connection', (ws) => {
    clients.push(ws);
    ws.on('close', () => { clients = clients.filter(c => c !== ws); });
});

const broadcast = (data) => {
    clients.forEach(c => { if (c.readyState === WebSocket.OPEN) c.send(JSON.stringify(data)); });
};

// 실시간 승무원 현황 및 마지막 원격 로그 수집 쿼리
app.get('/api/v1/frms/crew-status', async (req, res) => {
    try {
        const query = \`
            SELECT DISTINCT ON (c.id) 
                c.id as crew_id, c.name, c.rank, c.crew_id_tag,
                t.heart_rate, t.hrv_ms, t.respiratory_rate, t.spo2_percent,
                t.tvoc_ppb, t.co2_ppm, t.ethanol_raw, t.gyro_angle_pitch, t.fall_detected,
                d.battery_level, t.recorded_at
            FROM crew_profiles c
            LEFT JOIN telemetry_logs t ON c.id = t.crew_id
            LEFT JOIN devices d ON c.id = d.paired_crew_id
            ORDER BY c.id, t.recorded_at DESC;\`;
        const result = await pool.query(query);
        res.json(result.rows);
    } catch (err) {
        res.status(500).json({ error: '데이터베이스 쿼리 오류 발생' });
    }
});`
        };

        function App() {
            // 시뮬레이터 글로벌 상태 데이터 정의
            const [crewTelemetry, setCrewTelemetry] = useState({
                id: 1,
                name: '김선수',
                rank: '사무장',
                hr: 75,
                hrv: 58,
                rr: 14,
                temp: 36.5,
                spo2: 98,
                tvoc: 14.5,
                co2: 450.0,
                h2: 13950.0,
                ethanol: 19180.0,
                gyro: 5,
                fall: false,
                battery: 92,
                sleep: '6h 40m'
            });

            // 시뮬레이션용 데이터베이스 로그
            const [dbTelemetryLogs, setDbTelemetryLogs] = useState([
                { id: 1845, device_uid: '65540', tvoc: 14.5, co2: 450.0, h2: 13950, ethanol: 19180, dt: '2026-07-18T15:30:12' },
                { id: 1844, device_uid: '65540', tvoc: 13.0, co2: 432.0, h2: 13948, ethanol: 19172, dt: '2026-07-18T15:25:01' },
                { id: 1843, device_uid: '65540', tvoc: 12.1, co2: 410.0, h2: 13955, ethanol: 19169, dt: '2026-07-18T15:20:00' }
            ]);

            const [dbSafetyAlerts, setDbSafetyAlerts] = useState([
                { id: 9811, crew_id: 1, name: '김선수', type: 'GAS_EXPOSURE', severity: 'WARNING', val: 'eCO2 limit exceeded: 1200 ppm', status: 'RESOLVED', dt: '2026-07-18T14:45:22' }
            ]);

            const [dbActionReports, setDbActionReports] = useState([
                { id: 41, alert_id: 9811, crew_name: '김선수', desc: '이산화탄소 환기 장치 즉시 개방 완료. 산소포화도 리커버리 확인.', handler: 'GCS_본부관제실', dt: '2026-07-18T14:50:00' }
            ]);

            const [serverLogs, setServerLogs] = useState([
                { type: 'info', time: '15:30:00', text: '[Render Server] AIRFITME 백엔드가 포트 10000에서 정상 구동되었습니다.' },
                { type: 'db', time: '15:30:02', text: '[PostgreSQL Pool] AWS RDS 인스턴스 연결 상태가 정상입니다.' },
                { type: 'api', time: '15:30:12', text: '[API] GET /api/v1/frms/crew-status - 200 OK' }
            ]);

            const [activeExportTab, setActiveExportTab] = useState('sql');
            const [mobileCurrentTab, setMobileCurrentTab] = useState('Home');
            const [actionInput, setActionInput] = useState('');
            const [selectedAlert, setSelectedAlert] = useState(9811);
            const [soundOn, setSoundOn] = useState(false);

            const terminalEndRef = useRef(null);
            const audioCtxRef = useRef(null);
            const oscRef = useRef(null);

            // 가상 서버 로그 유틸리티
            const addLog = (text, type = 'info') => {
                const now = new Date();
                const timeStr = now.toTimeString().split(' ')[0];
                setServerLogs(prev => [...prev, { type, time: timeStr, text }]);
            };

            // 피로도 가이드라인 점수 공식 산출 함수
            const getFatigueScore = () => {
                let score = 25;
                score += (100 - crewTelemetry.hrv) * 0.25;
                score += (100 - crewTelemetry.spo2) * 2.2;
                score += Math.abs(crewTelemetry.rr - 14) * 3;
                if (crewTelemetry.co2 > 1000) score += 15;
                if (crewTelemetry.fall) score += 35;
                return Math.min(100, Math.max(0, Math.round(score)));
            };

            const fatigueScore = getFatigueScore();
            const riskLevel = fatigueScore >= 75 ? 'CRITICAL' : fatigueScore >= 45 ? 'ELEVATED' : 'LOW';

            // 자이로센서/가스 변동 발생 핸들러
            const handleTelemetryChange = (key, val) => {
                const updated = { ...crewTelemetry, [key]: val };

                if (key === 'fall') {
                    if (val === true) {
                        updated.gyro = 89;
                        updated.hr = 110;
                        updated.hrv = 18;
                        if (soundOn) startSiren();
                        
                        const newAlertId = Math.floor(Math.random() * 1000) + 9000;
                        const newAlert = {
                            id: newAlertId,
                            crew_id: 1,
                            name: '김선수',
                            type: 'FALL_DETECTED',
                            severity: 'DANGER',
                            val: '자이로센서 급변(89도) - 낙상 및 체스트벨트 이탈 감지',
                            status: 'ACTIVE',
                            dt: new Date().toISOString()
                        };
                        setDbSafetyAlerts(prev => [newAlert, ...prev]);
                        setSelectedAlert(newAlertId);
                        addLog(`[PostgreSQL DB] INSERT INTO safety_alerts (id, crew_id, alert_type, severity_level) VALUES (${newAlertId}, 1, 'FALL_DETECTED', 'DANGER')`, 'db');
                        addLog(`[WebSocket Trigger] 비상 무선 패킷 브로드캐스팅 성공 - 사무장 김선수`, 'warn');
                    } else {
                        updated.gyro = 5;
                        updated.hr = 75;
                        updated.hrv = 58;
                        stopSiren();
                    }
                }

                setCrewTelemetry(updated);

                // 통신 로그 갱신 모사
                if (Math.random() > 0.4) {
                    const logId = Math.floor(Math.random() * 1000) + 1800;
                    const newLog = {
                        id: logId,
                        device_uid: '65540',
                        tvoc: updated.tvoc,
                        co2: updated.co2,
                        h2: updated.h2,
                        ethanol: updated.ethanol,
                        dt: new Date().toISOString()
                    };
                    setDbTelemetryLogs(prev => [newLog, ...prev.slice(0, 5)]);
                    addLog(`[PostgreSQL] INSERT INTO telemetry_logs (device_uid, heart_rate, co2_ppm) VALUES ('65540', ${updated.hr}, ${updated.co2})`, 'db');
                    addLog(`[Render Host] API Ingestion POST /api/v1/frms/telemetry - 201 Created (Log ID: ${logId})`, 'api');
                }
            };

            // 가상 경보음 발송 컨트롤 (AudioContext)
            const startSiren = () => {
                try {
                    if (!audioCtxRef.current) {
                        audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    if (!oscRef.current) {
                        const ctx = audioCtxRef.current;
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(880, ctx.currentTime);
                        gain.gain.setValueAtTime(0.05, ctx.currentTime);
                        
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.start();
                        oscRef.current = osc;

                        osc.interval = setInterval(() => {
                            if (oscRef.current) {
                                osc.frequency.setValueAtTime(osc.frequency.value === 880 ? 660 : 880, ctx.currentTime);
                            }
                        }, 400);
                    }
                } catch (e) {
                    console.warn("오디오 컨텍스트 기동 실패");
                }
            };

            const stopSiren = () => {
                if (oscRef.current) {
                    clearInterval(oscRef.current.interval);
                    oscRef.current.stop();
                    oscRef.current.disconnect();
                    oscRef.current = null;
                }
            };

            // 관제실에서 PostgreSQL 조치 내역 SQL Sync 시뮬레이션
            const handlePostReport = (e) => {
                e.preventDefault();
                if (!actionInput.trim()) return;

                const targetId = parseInt(selectedAlert);
                const alertMatch = dbSafetyAlerts.find(a => a.id === targetId);
                const targetName = alertMatch ? alertMatch.name : '김선수';

                setDbSafetyAlerts(prev => prev.map(a => {
                    if (a.id === targetId) return { ...a, status: 'RESOLVED' };
                    return a;
                }));

                const reportId = Math.floor(Math.random() * 100) + 50;
                const newReport = {
                    id: reportId,
                    alert_id: targetId,
                    crew_name: targetName,
                    desc: actionInput,
                    handler: 'GCS_본부관제실',
                    dt: new Date().toISOString()
                };

                setDbActionReports(prev => [newReport, ...prev]);
                setActionInput('');

                if (alertMatch && alertMatch.type === 'FALL_DETECTED') {
                    handleTelemetryChange('fall', false);
                }

                addLog(`[PostgreSQL DB] UPDATE safety_alerts SET status='RESOLVED' WHERE id=${targetId};`, 'db');
                addLog(`[PostgreSQL DB] INSERT INTO action_reports (id, alert_id, action_description) VALUES (${reportId}, ${targetId}, ...)`, 'db');
                addLog(`[Render Host] Websocket Broadcast -> ALERT_RESOLVED 브로드캐스팅 송출`, 'api');
                stopSiren();
            };

            useEffect(() => {
                if (terminalEndRef.current) {
                    terminalEndRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }, [serverLogs]);

            return (
                <div className="p-4 lg:p-6 max-w-7xl mx-auto space-y-6">
                    {/* 상단 통합 제어 보드 */}
                    <header className="flex flex-col md:flex-row justify-between items-center bg-navy-900 border border-navy-700/60 p-5 rounded-2xl shadow-xl gap-4">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-skyBlue rounded-2xl flex items-center justify-center text-navy-950 font-black text-2xl">
                                <i className="fa-solid fa-plane-shield"></i>
                            </div>
                            <div>
                                <h1 className="text-xl font-extrabold text-white flex items-center gap-2">
                                    AIRFITME FRMS <span className="text-xs bg-skyBlue/10 text-skyBlue px-2 py-0.5 rounded-full border border-skyBlue/30 font-normal">S23 하이브리드 가이드</span>
                                </h1>
                                <p className="text-xs text-slate-400 font-mono">RENDER WEB & POSTGRESQL MULTI-SYSTEM SIMULATOR</p>
                            </div>
                        </div>

                        <div className="flex flex-wrap items-center gap-4 text-xs font-mono">
                            <div className="flex items-center gap-2 bg-navy-950 px-3 py-1.5 rounded-xl border border-navy-700">
                                <span className="w-2.5 h-2.5 rounded-full bg-emerald-500 critical-pulse"></span>
                                <span className="text-slate-300">WEB: https://github.com/ohseyokr/airfitme</span>
                            </div>
                            <div className="flex items-center gap-2 bg-navy-950 px-3 py-1.5 rounded-xl border border-navy-700">
                                <i className="fa-solid fa-volume-high text-skyBlue"></i>
                                <button 
                                    onClick={() => { setSoundOn(!soundOn); if (soundOn) stopSiren(); }}
                                    className="text-slate-300 hover:text-white"
                                >
                                    {soundOn ? "경보음 ON" : "경보음 무음"}
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* 시뮬레이터 주요 구획 */}
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
                        
                        {/* 왼쪽 구획 - 변수 주입기 & 서버 로그 */}
                        <div className="lg:col-span-3 space-y-6">
                            
                            {/* IoT 센서 조작용 패널 */}
                            <section className="bg-navy-900 border border-navy-700/60 p-5 rounded-3xl shadow-xl space-y-4">
                                <div className="flex justify-between items-center pb-2 border-b border-navy-700">
                                    <h2 className="font-bold text-white flex items-center gap-2 text-xs uppercase tracking-wider">
                                        <i className="fa-solid fa-sliders text-skyBlue"></i> IoT 센서 신호 주입기
                                    </h2>
                                    <span className="text-[10px] bg-skyBlue/10 text-skyBlue px-2 py-0.5 rounded font-mono">Smartwatch</span>
                                </div>

                                <div className="space-y-4 text-xs">
                                    {/* SpO2 */}
                                    <div>
                                        <div className="flex justify-between font-mono mb-1 text-slate-400">
                                            <span>혈중 산소포화도 (SpO2)</span>
                                            <span className="text-skyBlue font-bold">{crewTelemetry.spo2}%</span>
                                        </div>
                                        <input 
                                            type="range" min="82" max="100" value={crewTelemetry.spo2}
                                            onChange={(e) => handleTelemetryChange('spo2', parseInt(e.target.value))}
                                            className="w-full h-1 bg-navy-950 rounded-lg appearance-none cursor-pointer accent-skyBlue"
                                        />
                                    </div>

                                    {/* CO2 */}
                                    <div>
                                        <div className="flex justify-between font-mono mb-1 text-slate-400">
                                            <span>기내 이산화탄소 (eCO2)</span>
                                            <span className="text-aviationOrange font-bold">{crewTelemetry.co2} ppm</span>
                                        </div>
                                        <input 
                                            type="range" min="400" max="2200" value={crewTelemetry.co2}
                                            onChange={(e) => handleTelemetryChange('co2', parseInt(e.target.value))}
                                            className="w-full h-1 bg-navy-950 rounded-lg appearance-none cursor-pointer accent-skyBlue"
                                        />
                                    </div>

                                    {/* TVOC */}
                                    <div>
                                        <div className="flex justify-between font-mono mb-1 text-slate-400">
                                            <span>기내 유해성분 (TVOC)</span>
                                            <span className="text-aviationTeal font-bold">{crewTelemetry.tvoc} ppb</span>
                                        </div>
                                        <input 
                                            type="range" min="5" max="300" value={crewTelemetry.tvoc}
                                            onChange={(e) => handleTelemetryChange('tvoc', parseInt(e.target.value))}
                                            className="w-full h-1 bg-navy-950 rounded-lg appearance-none cursor-pointer accent-skyBlue"
                                        />
                                    </div>

                                    {/* 자이로센서 낙상 전송 토글 */}
                                    <div className="pt-4 border-t border-navy-700 flex items-center justify-between">
                                        <div>
                                            <span className="font-bold text-white block">자이로 낙상 센서 수동 제어</span>
                                            <span className="text-[10px] text-slate-400">89도 각도 급전환 테스트</span>
                                        </div>
                                        <button 
                                            onClick={() => handleTelemetryChange('fall', !crewTelemetry.fall)}
                                            className={`px-3 py-1.5 rounded-xl font-bold font-mono text-xs transition ${crewTelemetry.fall ? 'bg-aviationRed text-white critical-pulse' : 'bg-navy-950 text-slate-400 border border-navy-700'}`}
                                        >
                                            {crewTelemetry.fall ? '낙상 (Lying)' : '정상 (Standing)'}
                                        </button>
                                    </div>
                                </div>
                            </section>

                            {/* Render DB/Backend 로그 모니터 */}
                            <section className="bg-navy-900 border border-navy-700/60 p-5 rounded-3xl shadow-xl space-y-3">
                                <h2 className="font-bold text-white flex items-center gap-2 text-xs uppercase tracking-wider">
                                    <i className="fa-solid fa-terminal text-emerald-400"></i> Render & DB 실시간 로그
                                </h2>
                                <div className="bg-black/90 rounded-2xl p-4 font-mono text-[10px] h-52 overflow-y-auto space-y-2 border border-navy-950">
                                    {serverLogs.map((log, index) => (
                                        <div key={index} className="leading-relaxed border-b border-navy-950/20 pb-1">
                                            <span className="text-slate-600">[{log.time}]</span>{' '}
                                            <span className={
                                                log.type === 'db' ? 'text-indigo-400' :
                                                log.type === 'warn' ? 'text-aviationRed font-bold' :
                                                log.type === 'api' ? 'text-emerald-400' : 'text-slate-300'
                                            }>
                                                {log.text}
                                            </span>
                                        </div>
                                    ))}
                                    <div ref={terminalEndRef} />
                                </div>
                            </section>

                        </div>

                        {/* 중간 구획 - 갤럭시 S23 (SM-S911N) 웹뷰 하이브리드 앱 외관 */}
                        <div className="lg:col-span-4 flex flex-col items-center">
                            <span className="text-xs font-mono text-slate-400 mb-2">
                                <i className="fa-solid fa-mobile-screen text-skyBlue"></i> 갤럭시 S23 One UI 8.5 물리 뷰포트 (360px)

                            <div className="relative w-[360px] h-[700px] bg-navy-950 rounded-[44px] p-2.5 shadow-2xl border-[6px] border-slate-700/90 flex flex-col overflow-hidden">

                                            document.execCommand('copy');
                                            document.body.removeChild(el);
                                            addLog(`[Sys] 클립보드 복사 완료`, 'api');
                                        }}
                                        className="absolute top-2 right-2 bg-navy-800 text-slate-300 hover:text-white px-2 py-1 rounded text-[9px] font-mono"
                                    >
                                        <i className="fa-solid fa-copy"></i> 복사
                                    </button>
                                    <pre className="font-mono text-[8.5px] text-slate-300 h-40 overflow-y-auto whitespace-pre-wrap leading-relaxed">
                                        {activeExportTab === 'sql' ? ARCHITECTURE_CODE.sqlSchema : ARCHITECTURE_CODE.expressServer}
                                    </pre>
                                </div>
                            </section>

                        </div>

                    </div>
                </div>
            );
        }

        const rootEl = document.getElementById('root');
        const reactRoot = ReactDOM.createRoot(rootEl);
        reactRoot.render(<App />);
    </script>
</body>
</html>
